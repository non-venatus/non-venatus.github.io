# =====================================================
# BOOK ENGAGEMENTS / EVENTS
# Edit this file to add events. 
# image: path relative to /img/ folder
# popup_text: full description shown in the event popup
# =====================================================

events:
  - id: "panel-1"
    title: "4S Panel- Toronto"
    date: "October 2026"
    venue: "Society for Social Studies of Science (4S) Conference, 2026 - Toronto"
    short_desc: "Open Panel on Diagrammatic Techniques in Research"
    image: "img/4S-toronto.png"
    popup_text: >
      We are hosting an open panel at 4S'26 happening in Toronto in October. We have received
      submissions from other researchers experimenting with co-design and participatory design
      in their works. We are hoping to exchange lessons from the field when the researcher-participant
      relationship is reflected upon to decenter epistemic power.
    tags: ["4S", "Toronto", "Panel"]

  - id: "launch-delhi"
    title: "Book Launch — Delhi"
    date: "July 2026"
    venue: "India International Centre, New Delhi"
    short_desc: "Official launch of Non-Venatus with panel discussion"
    image: "img/event-placeholder.jpg"
    popup_text: >
      The official launch event for Non-Venatus: On the Production of Wars and Universities 
      at the India International Centre, New Delhi. The event featured a panel discussion 
      with scholars from political philosophy, postcolonial studies, and peace studies. 
      The author Hidam Premananda was joined by academics from University of Delhi and 
      Jawaharlal Nehru University to discuss the key concepts of the book, including 
      venatus, Non-Venatus Studies, and peace nomadology.
    tags: ["Launch", "Panel Discussion"]

  - id: "bloomsbury-talk"
    title: "Bloomsbury Author Talk"
    date: "August 2026"
    venue: "Online / Bloomsbury Publishing"
    short_desc: "Author talk hosted by Bloomsbury Academic"
    image: "img/event-placeholder.jpg"
    popup_text: >
      An online author talk hosted by Bloomsbury Academic featuring Hidam Premananda 
      in conversation about the intellectual journey behind Non-Venatus. The discussion 
      explored the book's engagement with thinkers like Deleuze, Guattari, Öcalan, and 
      the Dalai Lama, and what it means to build a 'Non-Venatus Studies' outside 
      conventional academic standards.
    tags: ["Online", "Author Talk"]

  - id: "read-act-session"
    title: "Read-Act Special Session"
    date: "September 2026"
    venue: "Read-Act Community, New Delhi"
    short_desc: "A special reading and discussion session with the Read-Act community"
    image: "img/event-placeholder.jpg"
    popup_text: >
      A special session of the Read-Act book club dedicated to Non-Venatus. 
      Participants read and discussed selected chapters from the book, focusing on 
      the themes of 'peace nomadology' and the critique of academic violence. 
      The session brought together scholars, artists, and activists to engage with 
      the book's proposals for fugitive thinking.
    tags: ["Reading Group", "Community"]

  - id: "workshop-1"
    title: "Diagrammatic Techniques in Research (Workshop)"
    date: "December 2025"
    venue: "IIT-Delhi / OP Jindal Global University"
    short_desc: "Research workshop at the STS India Network Conference 2025"
    image: "img/sts-workshop.jpg"
    popup_text: >
      We presented the diagrammatic technique for research proposed in the book- Non-Venatus. The participants
      actively contributed to the engagement by contextualizing the propositions in their
      own research works. We plan to re-convene after the book launch in August 2026 to discuss
      the progres with the participants and formulate a long-term plan for enaggement.
    tags: ["Workshop", "STS", "Diagrammatic Technique"]
