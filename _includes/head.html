<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ page.description | default: site.description }}">
<meta name="google-site-verification" content="5CZTX9Pg1uzk_rBVX9_XwJyGLT8wVFbvQXD_rKbtZTM" />
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:type" content="website">
<title>{% if page.title and page.title != 'Home' %}{{ page.title }} — {% endif %}{{ site.title }} · Bloomsbury 2026</title>
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" type="image/png" sizes="32x32" href="{{ site.baseurl }}/favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="{{ site.baseurl }}/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="{{ site.baseurl }}/favicon.png">
<meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/img/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
